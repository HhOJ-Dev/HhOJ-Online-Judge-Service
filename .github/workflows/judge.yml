name: HhOJ Online Judge

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  judge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ gcc default-jdk python3 mono-complete fp-compiler curl jq
          pip install requests pycryptodome

      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.HHOJ_API_KEY }}" ]; then
            echo "::error::HHOJ_API_KEY secret is not configured"
            exit 1
          fi
          if [ -z "${{ secrets.HHOJ_HOST }}" ]; then
            echo "::error::HHOJ_HOST secret is not configured"
            exit 1
          fi
          HOST="${{ secrets.HHOJ_HOST }}"
          HOST="${HOST%/}"
          echo "HHOJ_HOST = $HOST"
          echo "HOST=$HOST" >> $GITHUB_ENV
          echo "Secrets validation passed"

      - name: Network Diagnostic
        run: |
          echo "=== DNS Resolution ==="
          HOSTNAME=$(echo "$HOST" | sed -E 's/^https?:\/\///' | sed -E 's/\/.*$//')
          echo "Hostname: $HOSTNAME"
          nslookup "$HOSTNAME" 2>&1 || echo "nslookup failed"

          echo ""
          echo "=== Ping Test ==="
          ping -c 2 "$HOSTNAME" 2>&1 || echo "ping failed (may be blocked)"

          echo ""
          echo "=== Curl HEAD Test ==="
          curl -sIL --max-time 10 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            "$HOST" 2>&1 | head -20 || echo "curl HEAD failed"

      - name: Fetch Submissions from API
        id: fetch
        run: |
          echo "Fetching pending submissions..."

          python3 blankend/fetch_submissions.py \
            --host "$HOST" \
            --api-key "${{ secrets.HHOJ_API_KEY }}" \
            --output submissions.json \
            --batch 1 \
            --inline-testcases 1

          if [ ! -f submissions.json ]; then
            echo "::error::Failed to fetch submissions"
            exit 1
          fi

          SUCCESS=$(cat submissions.json | jq -r '.success' 2>/dev/null || echo "false")
          if [ "$SUCCESS" != "true" ]; then
            MSG=$(cat submissions.json | jq -r '.message' 2>/dev/null || echo "Unknown error")
            echo "::error::API error: $MSG"
            exit 1
          fi

          COUNT=$(cat submissions.json | jq '.submissions | length' 2>/dev/null || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Submissions fetched: $COUNT"

      - name: Process Submissions
        if: steps.fetch.outputs.count > 0
        run: |
          cd blankend
          python3 judge.py \
            --api-key "${{ secrets.HHOJ_API_KEY }}" \
            --site-url "$HOST" \
            --submissions ../submissions.json \
            --work-dir ../judge_work

      - name: No Pending Submissions
        if: steps.fetch.outputs.count == 0
        run: |
          echo "No pending submissions to judge"
          echo '{"status":"skip","message":"No pending submissions"}' > judge_result.json
          echo "SKIP" > status.txt
          echo "## HhOJ Judge Result" > summary.md
          echo "" >> summary.md
          echo "**Status**: No pending submissions" >> summary.md

      - name: Generate Summary Report
        if: always()
        run: |
          if [ -f summary.md ]; then
            cat summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## HhOJ Judge Result" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Verdict**: Unknown Error (UKE)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-results
          path: |
            status.txt
            judge_result.json
            submissions.json
            curl_error.log
            compile_error.log
            run_error.log
            summary.md
            ans*.out
            judge_work/
          if-no-files-found: ignore
