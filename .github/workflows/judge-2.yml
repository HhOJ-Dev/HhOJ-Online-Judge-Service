name: HhOJ Online Judge (Worker 2)

on:
  workflow_dispatch:
  schedule:
    # Worker 2: 分钟 2,7,12,17... (与 Worker 1 错开2分钟)
    - cron: '2/5 * * * *'

permissions:
  contents: read
  packages: read

jobs:
  judge:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/hhoj-dev/judge-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Judge
        id: judge
        run: |
          if [ -z "${{ secrets.HHOJ_API_KEY }}" ]; then
            echo "::error::HHOJ_API_KEY not configured" && exit 1
          fi
          if [ -z "${{ secrets.HHOJ_HOST }}" ]; then
            echo "::error::HHOJ_HOST not configured" && exit 1
          fi
          HOST="${{ secrets.HHOJ_HOST }}"
          HOST="${HOST%/}"
          bash blankend/judge_all.sh "$HOST" "${{ secrets.HHOJ_API_KEY }}"

      - name: Summary
        if: always()
        run: |
          if [ -f summary.md ]; then
            cat summary.md >> $GITHUB_STEP_SUMMARY
          else
            printf "## HhOJ Judge Result\n\n**Verdict**: Unknown Error (UKE)\n" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: judge-results-w2
          path: |
            status.txt
            judge_result.json
            submissions.json
            summary.md
            judge_work/
          if-no-files-found: ignore
