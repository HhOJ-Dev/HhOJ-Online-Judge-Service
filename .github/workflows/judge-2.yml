name: HhOJ Online Judge (Worker 2)

on:
  workflow_dispatch:
  schedule:
    - cron: '2/5 * * * *'

permissions:
  contents: read

concurrency:
  group: judge-worker-2
  cancel-in-progress: true

jobs:
  judge:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      HHOJ_API_KEY: ${{ secrets.HHOJ_API_KEY }}
      HHOJ_HOST: ${{ secrets.HHOJ_HOST }}
    steps:
      - name: Checkout & Run
        run: |
          set -euo pipefail
          
          if [ -z "$HHOJ_API_KEY" ] || [ -z "$HHOJ_HOST" ]; then
            echo "::error::Secrets not configured"
            exit 1
          fi
          
          START=$(date +%s%N)
          
          cd /tmp
          rm -rf hhoj-judge
          git clone --depth=1 --sparse https://github.com/HhOJ-Dev/HhOJ-Online-Judge-Service.git hhoj-judge
          cd hhoj-judge
          git sparse-checkout set blankend
          
          echo "Checkout: $((($(date +%s%N) - START)/1000000))ms"
          
          pip install -q requests pycryptodome
          
          echo "Pip: $((($(date +%s%N) - START)/1000000))ms"
          
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends gcc g++ >/dev/null
          
          echo "Compiler: $((($(date +%s%N) - START)/1000000))ms"
          
          HOST="${HHOJ_HOST%/}"
          bash blankend/judge_all.sh "$HOST"
          
          echo "Total: $((($(date +%s%N) - START)/1000000))ms"
          
          cp status.txt judge_result.json submissions.json summary.md /tmp/ || true

      - name: Summary
        if: always()
        run: |
          if [ -f /tmp/summary.md ]; then
            cat /tmp/summary.md >> $GITHUB_STEP_SUMMARY
          else
            printf "## HhOJ Judge Result\n\n**Verdict**: Unknown Error (UKE)\n" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: judge-results-w2
          path: |
            /tmp/status.txt
            /tmp/judge_result.json
            /tmp/submissions.json
            /tmp/summary.md
          if-no-files-found: ignore
