name: HhOJ Online Judge (Worker 3)

on:
  workflow_dispatch:
  schedule:
    - cron: '4/5 * * * *'

permissions:
  contents: read

jobs:
  judge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            blankend

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: blankend/requirements.txt

      - name: Install deps
        run: pip install -r blankend/requirements.txt

      - name: Run Judge
        run: |
          if [ -z "${{ secrets.HHOJ_API_KEY }}" ]; then
            echo "::error::HHOJ_API_KEY not configured" && exit 1
          fi
          if [ -z "${{ secrets.HHOJ_HOST }}" ]; then
            echo "::error::HHOJ_HOST not configured" && exit 1
          fi
          HOST="${{ secrets.HHOJ_HOST }}"
          HOST="${HOST%/}"
          bash blankend/judge_all.sh "$HOST" "${{ secrets.HHOJ_API_KEY }}"

      - name: Summary
        if: always()
        run: |
          if [ -f summary.md ]; then
            cat summary.md >> $GITHUB_STEP_SUMMARY
          else
            printf "## HhOJ Judge Result\n\n**Verdict**: Unknown Error (UKE)\n" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: judge-results-w3
          path: |
            status.txt
            judge_result.json
            submissions.json
            summary.md
          if-no-files-found: ignore
